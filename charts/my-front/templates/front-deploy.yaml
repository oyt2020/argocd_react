apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: react
  name: yolo-front
  namespace: front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react
  strategy: {}
  template:
    metadata:
      labels:
        app: react
    spec:
      containers:
      - image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        name: react-vite
        resources: {}
        ports:
        - containerPort: 80
status: {}
