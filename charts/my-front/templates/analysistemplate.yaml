apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: front-success-check
  namespace: front  # 리액트 앱과 같은 네임스페이스에 생성
spec:
  metrics:
  - name: success-rate
    interval: 30s    # 30초마다 체크
    count: 3         # 총 3번 체크
    # 성공 조건: 2xx 응답 비율이 95% 이상일 것
    successCondition: len(result) > 0 && result[0] >= 0.95
    failureLimit: 1  # 1번이라도 실패하면 즉시 롤백
    provider:
      prometheus:
        address: http://15.165.47.12:30010 # 프로메테우스 접속 주소
        query: |
          sum(rate(nginx_vts_server_requests_total{code="2xx"}[1m])) 
          / 
          sum(rate(nginx_vts_server_requests_total[1m]))