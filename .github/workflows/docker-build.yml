name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'charts/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.qualitygate.wait=true

    - name: Login Docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker build
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        load: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/yolo-front:1.2.${{ github.run_number }}

    - name: Run Trivy
      uses: aquasecurity/trivy-action@dea62cf79abc269fc35dfd161a4539f0d1f92293
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/yolo-front:1.2.${{ github.run_number }}'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL, HIGH'
        ignore-unfixed: true

    - name: Docker push
      env:
        docker_user: ${{ secrets.DOCKERHUB_USERNAME }}
      run: |
        docker push $docker_user/yolo-front:1.2.${{ github.run_number }}
      

    - name: Update Helm Values
      run: |
        sed -i "s/tag: .*/tag: \"1.2.${{ github.run_number }}\"/g" charts/my-front/values.yaml
        
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add charts/my-front/values.yaml
        git commit -m "update image tag to ${{ github.run_number }} [skip ci]"
        git push

