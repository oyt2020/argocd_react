name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'charts/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: .
        args: >
          -Dsonar.projectKey=my-react-front
          -Dsonar.sources=src
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

    - name: SonarQube Quality
      uses: SonarSource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Login Docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker build
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/yolo-front:1.2.${{ github.run_number }}

    - name: Update Helm Values
      run: |
        sed -i "s/tag: .*/tag: \"1.2.${{ github.run_number }}\"/g" charts/my-front/values.yaml
        
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add charts/my-front/values.yaml
        git commit -m "update image tag to ${{ github.run_number }} [skip ci]"
        git push

