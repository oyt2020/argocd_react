apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: front-egress
  namespace: front
spec:
  podSelector:
    matchLabels:
      app: react
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app: fast
          podSelector:
            matchLabels:
              app: yolo-back
      ports:
        - protocol: TCP
          port: 8000